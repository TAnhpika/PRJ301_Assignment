# ===============================================
# 🎨 DENTAL CLINIC LOGGING CONFIGURATION
# ===============================================

# Root logger configuration
.level = INFO

# Handlers - Sử dụng ConsoleHandler để hiển thị màu sắc
handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# ===============================================
# 🖥️ CONSOLE HANDLER (Màu sắc)
# ===============================================
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# ===============================================
# 📁 FILE HANDLER (Lưu file)
# ===============================================
java.util.logging.FileHandler.pattern = %t/dental-clinic-%g.log
java.util.logging.FileHandler.limit = 10000000
java.util.logging.FileHandler.count = 5
java.util.logging.FileHandler.level = ALL
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# ===============================================
# 🎯 FORMAT PATTERN (Định dạng đẹp)
# ===============================================
# Pattern: [Thời gian] [Level] [Class] - Message
java.util.logging.SimpleFormatter.format = \u001B[90m[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS]\u001B[0m %4$s \u001B[36m%3$s\u001B[0m - %5$s%6$s%n

# ===============================================
# 📊 LOG LEVELS CHO CÁC PACKAGE
# ===============================================
# Application logs
controller.level = INFO
dao.level = INFO
model.level = INFO
utils.level = INFO

# Framework logs (giảm noise)
org.apache.catalina.level = WARNING
org.apache.tomcat.level = WARNING
org.apache.jasper.level = WARNING
com.microsoft.sqlserver.level = WARNING

# Database connection logs (chỉ hiển thị lỗi)
com.microsoft.sqlserver.jdbc.level = SEVERE

# ===============================================
# 🎨 CUSTOM FORMATTER CHO MÀU SẮC
# ===============================================
# Note: Một số terminal hỗ trợ ANSI colors
# SEVERE (ERROR) = Đỏ đậm
# WARNING = Vàng
# INFO = Xanh lá
# CONFIG = Xanh dương nhạt
# FINE = Xanh dương
# FINER = Tím
# FINEST = Xám 